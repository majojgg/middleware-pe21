openapi: "3.1.0"

info:
  title: "UIDE Inscripciones API"
  version: "2.0.0"
  description: "API para gestión de inscripciones académicas"
  license:
    name: "MIT"
    identifier: "MIT"

servers:
  - url: http://localhost:3000
    description: "Servidor local"

paths:
  /health:
    get:
      operationId: healthCheck
      summary: "Verificar estado de la API"

      security: []

      responses:
        "200":
          description: "API funcionando correctamente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  ts:
                    type: string
                    format: date-time
                    example: "2026-06-23T12:00:00.000Z"

        "401":
          description: "API key inválida o ausente"
          content:
            application/json:
              example:
                error: "API key inválida o ausente"

        "500":
          description: "Error interno del servidor"

  /v1/inscripciones:
    post:
      operationId: crearInscripcionV1
      summary: "Registrar una inscripción académica (v1)"

      security:
        - ApiKeyAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InscripcionV1Request"
            example:
              estudianteID: "123"
              materias:
                - "Middleware"
              periodoID: "2026-A"

      responses:
        "201":
          description: "Inscripción creada correctamente"
          content:
            application/json:
              example:
                version: "v1"
                estudianteID: "123"
                materias:
                  - "Middleware"
                periodoID: "2026-A"

        "400":
          description: "Campos requeridos: estudianteID, materias, periodoID"
          content:
            application/json:
              example:
                error: "Campos requeridos: estudianteID, materias, periodoID"

        "401":
          description: "API key inválida o ausente"

        "500":
          description: "Error interno del servidor"

  /v2/inscripciones:
    post:
      operationId: crearInscripcionV2
      summary: "Registrar una inscripción académica (v2)"

      security:
        - ApiKeyAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InscripcionV2Request"
            example:
              estudianteID: "123"
              materias:
                - "Middleware"
              periodoID: "2026-A"
              metodo_pago: "Transferencia"

      responses:
        "201":
          description: "Inscripción creada correctamente"
          content:
            application/json:
              example:
                version: "v2"
                estudianteID: "123"
                materias:
                  - "Middleware"
                periodoID: "2026-A"
                metodo_pago: "Transferencia"

        "400":
          description: "Datos inválidos o método de pago incorrecto"
          content:
            application/json:
              examples:
                campos_faltantes:
                  value:
                    error: "Campos requeridos: estudianteID, materias, periodoID, metodo_pago"

                metodo_invalido:
                  value:
                    error: "Método de pago inválido"

        "401":
          description: "API key inválida o ausente"

        "500":
          description: "Error interno del servidor"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    InscripcionV1Request:
      type: object

      required:
        - estudianteID
        - materias
        - periodoID

      properties:
        estudianteID:
          type: string
          example: "123"

        materias:
          type: array
          minItems: 1
          items:
            type: string
          example:
            - "Middleware"

        periodoID:
          type: string
          example: "2026-A"

    InscripcionV2Request:
      type: object

      required:
        - estudianteID
        - materias
        - periodoID
        - metodo_pago

      properties:
        estudianteID:
          type: string
          example: "123"

        materias:
          type: array
          minItems: 1
          items:
            type: string
          example:
            - "Middleware"

        periodoID:
          type: string
          example: "2026-A"

        metodo_pago:
          type: string
          enum:
            - Efectivo
            - Transferencia
            - Débito
            - Crédito
          example: "Transferencia"